<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Press Start 2P', 'Courier New', monospace;
    }
    canvas {
      display: block;
      cursor: pointer;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============ GAME SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Original Flappy Bird resolution scaled up
const GAME_WIDTH = 288;
const GAME_HEIGHT = 512;
const SCALE = Math.min(
  window.innerHeight / GAME_HEIGHT,
  window.innerWidth / GAME_WIDTH,
  2
);
canvas.width = GAME_WIDTH * SCALE;
canvas.height = GAME_HEIGHT * SCALE;
ctx.scale(SCALE, SCALE);
ctx.imageSmoothingEnabled = false;

// ============ AUDIO (Web Audio API) ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch(type) {
    case 'flap':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
      break;
    case 'score':
      osc.type = 'square';
      osc.frequency.setValueAtTime(932, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);
      break;
    case 'hit':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
      break;
    case 'die':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.5);
      break;
    case 'swoosh':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
      break;
  }
}

// ============ COLORS (Authentic Flappy Bird Palette) ============
const COLORS = {
  sky: '#4EC0CA',
  skyGrad: '#70C5CE',
  ground: '#DED895',
  groundDark: '#DAD085',
  groundStripe: '#C3B06E',
  pipeGreen: '#73BF2E',
  pipeGreenDark: '#558B20',
  pipeGreenLight: '#8CD43E',
  pipeGreenHighlight: '#B0E868',
  pipeBorder: '#543E1B',
  pipeShadow: '#4A7A1A',
  birdYellow: '#F8C83C',
  birdOrange: '#E8A020',
  birdDark: '#D89018',
  birdWhite: '#FAFAFA',
  birdRed: '#E84430',
  birdEye: '#FFFFFF',
  birdPupil: '#383838',
  birdBeak: '#E84430',
  white: '#FFFFFF',
  black: '#000000',
  scoreOutline: '#543E1B',
  bushGreen: '#5EB032',
  bushGreenLight: '#71C442',
  cloudWhite: '#E8E8E0',
  buildingTan: '#D8C898',
  buildingDark: '#C8B078',
};

// ============ GAME CONSTANTS ============
const GRAVITY = 0.4;
const FLAP_POWER = -6.5;
const PIPE_WIDTH = 52;
const PIPE_GAP = 100;
const PIPE_SPEED = 2;
const PIPE_SPAWN_INTERVAL = 90; // frames
const GROUND_HEIGHT = 112;
const GROUND_Y = GAME_HEIGHT - GROUND_HEIGHT;
const BIRD_X = 68;
const BIRD_WIDTH = 34;
const BIRD_HEIGHT = 24;
const BIRD_RADIUS = 12;

// ============ GAME STATE ============
let gameState = 'menu'; // menu, playing, dying, dead
let bird = {};
let pipes = [];
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappyBest') || '0');
let frameCount = 0;
let groundScroll = 0;
let flashAlpha = 0;
let deathTimer = 0;
let medalFlash = 0;

// Bird animation
let wingFrame = 0;
let wingTimer = 0;
const WING_SPEED = 6;

function resetGame() {
  bird = {
    x: BIRD_X,
    y: GAME_HEIGHT / 2 - 30,
    vy: 0,
    rotation: 0,
    alive: true,
  };
  pipes = [];
  score = 0;
  frameCount = 0;
  flashAlpha = 0;
  deathTimer = 0;
}

resetGame();

// ============ DRAWING FUNCTIONS ============

function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, COLORS.sky);
  skyGrad.addColorStop(1, COLORS.skyGrad);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GAME_WIDTH, GROUND_Y);

  // Clouds
  drawClouds();

  // City silhouette / buildings in background
  drawBuildings();

  // Bushes
  drawBushes();
}

function drawClouds() {
  ctx.fillStyle = COLORS.cloudWhite;
  const cloudOffset = (-frameCount * 0.3) % GAME_WIDTH;
  for (let i = 0; i < 3; i++) {
    let cx = ((i * 120 + cloudOffset) % (GAME_WIDTH + 80)) - 40;
    let cy = 40 + i * 30;
    drawCloud(cx, cy, 0.7 + i * 0.15);
  }
}

function drawCloud(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = COLORS.cloudWhite;
  ctx.beginPath();
  ctx.arc(0, 0, 20, 0, Math.PI * 2);
  ctx.arc(18, -4, 14, 0, Math.PI * 2);
  ctx.arc(-18, -2, 16, 0, Math.PI * 2);
  ctx.arc(8, -12, 12, 0, Math.PI * 2);
  ctx.arc(-8, -10, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBuildings() {
  const offset = (-frameCount * 0.5) % GAME_WIDTH;
  ctx.fillStyle = COLORS.buildingTan;
  const buildings = [
    { w: 36, h: 50 }, { w: 28, h: 35 }, { w: 42, h: 60 },
    { w: 20, h: 30 }, { w: 32, h: 45 }, { w: 38, h: 55 },
    { w: 24, h: 40 }, { w: 44, h: 48 }, { w: 30, h: 38 },
    { w: 36, h: 52 }, { w: 28, h: 42 },
  ];
  let bx = offset;
  for (const b of buildings) {
    let drawX = ((bx % (GAME_WIDTH + 60)) + GAME_WIDTH + 60) % (GAME_WIDTH + 60) - 30;
    ctx.fillStyle = COLORS.buildingTan;
    ctx.fillRect(drawX, GROUND_Y - b.h, b.w, b.h);
    ctx.fillStyle = COLORS.buildingDark;
    // Windows
    for (let wy = GROUND_Y - b.h + 6; wy < GROUND_Y - 8; wy += 10) {
      for (let wx = drawX + 5; wx < drawX + b.w - 5; wx += 8) {
        ctx.fillRect(wx, wy, 4, 5);
      }
    }
    bx += b.w + 4;
  }
}

function drawBushes() {
  const offset = (-frameCount * 0.8) % GAME_WIDTH;
  for (let i = 0; i < 6; i++) {
    let bx = ((i * 60 + offset) % (GAME_WIDTH + 60)) - 30;
    ctx.fillStyle = COLORS.bushGreen;
    ctx.beginPath();
    ctx.arc(bx, GROUND_Y, 16 + (i % 3) * 4, 0, Math.PI, true);
    ctx.fill();
    ctx.fillStyle = COLORS.bushGreenLight;
    ctx.beginPath();
    ctx.arc(bx + 8, GROUND_Y, 10 + (i % 2) * 3, 0, Math.PI, true);
    ctx.fill();
  }
}

function drawGround() {
  groundScroll = (groundScroll + PIPE_SPEED) % 24;

  // Main ground
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GROUND_HEIGHT);

  // Top stripe
  ctx.fillStyle = COLORS.groundStripe;
  ctx.fillRect(0, GROUND_Y, GAME_WIDTH, 2);

  // Ground pattern (diagonal stripes like original)
  ctx.fillStyle = COLORS.groundDark;
  for (let x = -groundScroll; x < GAME_WIDTH + 24; x += 24) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 2);
    ctx.lineTo(x + 12, GROUND_Y + 14);
    ctx.lineTo(x + 24, GROUND_Y + 2);
    ctx.fill();
  }

  // Darker section below
  ctx.fillStyle = COLORS.groundStripe;
  ctx.fillRect(0, GROUND_Y + 14, GAME_WIDTH, GROUND_HEIGHT - 14);
}

function drawPipe(x, topHeight) {
  const capHeight = 26;
  const capOverhang = 3;
  const bodyWidth = PIPE_WIDTH - 4;
  const bodyX = x + 2;

  // ===== TOP PIPE =====
  // Pipe body
  const pipeGrad = ctx.createLinearGradient(bodyX, 0, bodyX + bodyWidth, 0);
  pipeGrad.addColorStop(0, COLORS.pipeGreenDark);
  pipeGrad.addColorStop(0.15, COLORS.pipeGreenLight);
  pipeGrad.addColorStop(0.4, COLORS.pipeGreenHighlight);
  pipeGrad.addColorStop(0.7, COLORS.pipeGreen);
  pipeGrad.addColorStop(1, COLORS.pipeGreenDark);

  ctx.fillStyle = pipeGrad;
  ctx.fillRect(bodyX, 0, bodyWidth, topHeight - capHeight);

  // Pipe body border
  ctx.strokeStyle = COLORS.pipeBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(bodyX, 0, bodyWidth, topHeight - capHeight);

  // Pipe cap (top pipe)
  const capGrad = ctx.createLinearGradient(x - capOverhang, 0, x + PIPE_WIDTH + capOverhang, 0);
  capGrad.addColorStop(0, COLORS.pipeGreenDark);
  capGrad.addColorStop(0.15, COLORS.pipeGreenLight);
  capGrad.addColorStop(0.35, COLORS.pipeGreenHighlight);
  capGrad.addColorStop(0.7, COLORS.pipeGreen);
  capGrad.addColorStop(1, COLORS.pipeGreenDark);

  ctx.fillStyle = capGrad;
  ctx.fillRect(x - capOverhang, topHeight - capHeight, PIPE_WIDTH + capOverhang * 2, capHeight);
  ctx.strokeStyle = COLORS.pipeBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(x - capOverhang, topHeight - capHeight, PIPE_WIDTH + capOverhang * 2, capHeight);

  // ===== BOTTOM PIPE =====
  const bottomY = topHeight + PIPE_GAP;

  // Pipe body
  ctx.fillStyle = pipeGrad;
  ctx.fillRect(bodyX, bottomY + capHeight, bodyWidth, GROUND_Y - bottomY - capHeight);
  ctx.strokeStyle = COLORS.pipeBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(bodyX, bottomY + capHeight, bodyWidth, GROUND_Y - bottomY - capHeight);

  // Pipe cap (bottom pipe)
  ctx.fillStyle = capGrad;
  ctx.fillRect(x - capOverhang, bottomY, PIPE_WIDTH + capOverhang * 2, capHeight);
  ctx.strokeStyle = COLORS.pipeBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(x - capOverhang, bottomY, PIPE_WIDTH + capOverhang * 2, capHeight);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);

  // Rotate bird based on velocity
  let targetRotation;
  if (gameState === 'menu') {
    targetRotation = 0;
  } else if (bird.vy < 0) {
    targetRotation = -25 * Math.PI / 180;
  } else {
    targetRotation = Math.min(bird.vy * 5, 90) * Math.PI / 180;
  }
  bird.rotation += (targetRotation - bird.rotation) * 0.15;
  if (gameState === 'dying' || gameState === 'dead') {
    bird.rotation = 90 * Math.PI / 180;
  }
  ctx.rotate(bird.rotation);

  // Wing animation
  wingTimer++;
  if (wingTimer >= WING_SPEED) {
    wingTimer = 0;
    wingFrame = (wingFrame + 1) % 3;
  }

  const bw = BIRD_WIDTH;
  const bh = BIRD_HEIGHT;

  // Body (main yellow)
  ctx.fillStyle = COLORS.birdYellow;
  ctx.beginPath();
  ctx.ellipse(0, 0, bw / 2, bh / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body outline
  ctx.strokeStyle = COLORS.birdDark;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Belly (lighter)
  ctx.fillStyle = '#FCD84C';
  ctx.beginPath();
  ctx.ellipse(2, 3, bw / 2.8, bh / 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  ctx.fillStyle = COLORS.birdOrange;
  const wingOffsets = [-2, 2, -4]; // up, mid, down
  const wingY = wingOffsets[wingFrame];
  ctx.beginPath();
  ctx.ellipse(-4, wingY, 10, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = COLORS.birdDark;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Eye white
  ctx.fillStyle = COLORS.birdEye;
  ctx.beginPath();
  ctx.arc(8, -5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = COLORS.birdDark;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Eye pupil
  ctx.fillStyle = COLORS.birdPupil;
  ctx.beginPath();
  ctx.arc(10, -4, 3, 0, Math.PI * 2);
  ctx.fill();

  // Eye highlight
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(9, -6, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = COLORS.birdBeak;
  ctx.beginPath();
  ctx.moveTo(12, -1);
  ctx.lineTo(22, 1);
  ctx.lineTo(12, 5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#C03020';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Beak top part (orange-ish)
  ctx.fillStyle = '#F0A028';
  ctx.beginPath();
  ctx.moveTo(12, -1);
  ctx.lineTo(22, 1);
  ctx.lineTo(12, 1);
  ctx.closePath();
  ctx.fill();

  // Tail feathers
  ctx.fillStyle = COLORS.birdOrange;
  ctx.beginPath();
  ctx.moveTo(-14, -3);
  ctx.lineTo(-20, -8);
  ctx.lineTo(-16, -1);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-14, 0);
  ctx.lineTo(-20, 0);
  ctx.lineTo(-16, 3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ============ SCORE DISPLAY (Flappy Bird style) ============
function drawScoreDigit(digit, x, y, size) {
  // Draw bold outlined digits like the original
  ctx.save();
  ctx.font = `bold ${size}px 'Arial Black', 'Impact', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Dark outline
  ctx.strokeStyle = COLORS.scoreOutline;
  ctx.lineWidth = 4;
  ctx.lineJoin = 'round';
  ctx.strokeText(digit, x, y);

  // White fill
  ctx.fillStyle = COLORS.white;
  ctx.fillText(digit, x, y);

  // Subtle shadow inside
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillText(digit, x, y + 1);

  ctx.restore();
}

function drawScore() {
  const scoreStr = score.toString();
  const digitSize = 40;
  const digitWidth = 28;
  const totalWidth = scoreStr.length * digitWidth;
  const startX = GAME_WIDTH / 2 - totalWidth / 2 + digitWidth / 2;

  for (let i = 0; i < scoreStr.length; i++) {
    drawScoreDigit(scoreStr[i], startX + i * digitWidth, 50, digitSize);
  }
}

function drawSmallScore(value, x, y) {
  ctx.save();
  ctx.font = 'bold 16px Arial, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = COLORS.white;
  ctx.strokeStyle = COLORS.scoreOutline;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.strokeText(value.toString(), x, y);
  ctx.fillText(value.toString(), x, y);
  ctx.restore();
}

// ============ MENU & GAME OVER SCREENS ============
function drawMenu() {
  // Title "FLAPPY BIRD"
  ctx.save();
  ctx.font = 'bold 34px Arial Black, Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const titleY = 120 + Math.sin(frameCount * 0.05) * 6;

  // Title shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillText('Flappy Bird', GAME_WIDTH / 2 + 2, titleY + 2);

  // Title outline
  ctx.strokeStyle = COLORS.pipeBorder;
  ctx.lineWidth = 5;
  ctx.lineJoin = 'round';
  ctx.strokeText('Flappy Bird', GAME_WIDTH / 2, titleY);

  // Title fill gradient
  const titleGrad = ctx.createLinearGradient(0, titleY - 20, 0, titleY + 20);
  titleGrad.addColorStop(0, '#F8E848');
  titleGrad.addColorStop(0.5, '#F8C83C');
  titleGrad.addColorStop(1, '#E8A020');
  ctx.fillStyle = titleGrad;
  ctx.fillText('Flappy Bird', GAME_WIDTH / 2, titleY);

  ctx.restore();

  // Floating bird on menu
  const menuBirdY = bird.y + Math.sin(frameCount * 0.06) * 8;
  const origY = bird.y;
  bird.y = menuBirdY;
  drawBird();
  bird.y = origY;

  // "Tap to play" instruction
  const alpha = 0.5 + 0.5 * Math.sin(frameCount * 0.08);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 16px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = COLORS.white;
  ctx.strokeStyle = COLORS.scoreOutline;
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.strokeText('Click or Press Space', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 60);
  ctx.fillText('Click or Press Space', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 60);
  ctx.restore();
}

function drawGameOver() {
  // "GAME OVER" banner
  ctx.save();

  // Darken overlay
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, GAME_WIDTH, GROUND_Y);

  // Game Over text
  ctx.font = 'bold 30px Arial Black, Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = COLORS.scoreOutline;
  ctx.lineWidth = 4;
  ctx.lineJoin = 'round';
  ctx.strokeText('GAME OVER', GAME_WIDTH / 2, 100);
  ctx.fillStyle = '#F85030';
  ctx.fillText('GAME OVER', GAME_WIDTH / 2, 100);

  // Score panel
  const panelX = GAME_WIDTH / 2 - 100;
  const panelY = 140;
  const panelW = 200;
  const panelH = 100;

  // Panel background
  const panelGrad = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
  panelGrad.addColorStop(0, '#DEB050');
  panelGrad.addColorStop(1, '#C89840');
  ctx.fillStyle = panelGrad;
  roundRect(ctx, panelX, panelY, panelW, panelH, 8);
  ctx.fill();
  ctx.strokeStyle = '#A07828';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Inner panel
  ctx.fillStyle = '#C8A848';
  roundRect(ctx, panelX + 10, panelY + 10, panelW - 20, panelH - 20, 4);
  ctx.fill();
  ctx.strokeStyle = '#A08030';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Inner shadow
  ctx.fillStyle = '#B89838';
  roundRect(ctx, panelX + 12, panelY + 12, panelW - 24, panelH - 24, 3);
  ctx.fill();

  // "Score" label
  ctx.font = 'bold 12px Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#F0D878';
  ctx.strokeStyle = '#A07828';
  ctx.lineWidth = 1.5;
  ctx.strokeText('SCORE', panelX + 22, panelY + 30);
  ctx.fillText('SCORE', panelX + 22, panelY + 30);

  // Score value
  drawSmallScore(score, panelX + panelW - 22, panelY + 30);

  // "Best" label
  ctx.font = 'bold 12px Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#F0D878';
  ctx.strokeStyle = '#A07828';
  ctx.lineWidth = 1.5;
  ctx.strokeText('BEST', panelX + 22, panelY + 65);
  ctx.fillText('BEST', panelX + 22, panelY + 65);

  drawSmallScore(bestScore, panelX + panelW - 22, panelY + 65);

  // Medal
  if (score >= 10) {
    medalFlash = (medalFlash + 1) % 20;
    const medalColors = score >= 40 ? ['#FFD700', '#FFC400'] :
                        score >= 30 ? ['#C0C0C0', '#A0A0A0'] :
                        score >= 20 ? ['#CD7F32', '#B06828'] :
                                      ['#CD7F32', '#B06828'];
    const medalGlow = medalFlash < 10 ? 0.3 : 0;
    ctx.fillStyle = medalColors[0];
    ctx.beginPath();
    ctx.arc(panelX + 44, panelY + 52, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = medalColors[1];
    ctx.lineWidth = 2;
    ctx.stroke();
    if (medalGlow > 0) {
      ctx.fillStyle = `rgba(255,255,255,${medalGlow})`;
      ctx.beginPath();
      ctx.arc(panelX + 44, panelY + 52, 16, 0, Math.PI * 2);
      ctx.fill();
    }
    // Star on medal
    ctx.fillStyle = '#FFF8E0';
    drawStar(panelX + 44, panelY + 52, 5, 8, 4);
  }

  // Play button
  const btnX = GAME_WIDTH / 2 - 50;
  const btnY = 270;
  const btnW = 100;
  const btnH = 40;

  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#88C838');
  btnGrad.addColorStop(1, '#68A828');
  ctx.fillStyle = btnGrad;
  roundRect(ctx, btnX, btnY, btnW, btnH, 6);
  ctx.fill();
  ctx.strokeStyle = '#486818';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.font = 'bold 16px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = COLORS.white;
  ctx.strokeStyle = '#486818';
  ctx.lineWidth = 2;
  ctx.strokeText('PLAY', GAME_WIDTH / 2, btnY + btnH / 2);
  ctx.fillText('PLAY', GAME_WIDTH / 2, btnY + btnH / 2);

  // New best indicator
  if (score === bestScore && score > 0) {
    ctx.font = 'bold 10px Arial, sans-serif';
    ctx.fillStyle = '#F85030';
    ctx.textAlign = 'center';
    const newAlpha = 0.5 + 0.5 * Math.sin(frameCount * 0.1);
    ctx.globalAlpha = newAlpha;
    ctx.fillText('NEW!', panelX + panelW - 40, panelY + 55);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawStar(cx, cy, spikes, outerR, innerR) {
  let rot = Math.PI / 2 * 3;
  let step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============ COLLISION DETECTION ============
function checkCollision() {
  // Ground collision
  if (bird.y + BIRD_HEIGHT / 2 >= GROUND_Y) {
    bird.y = GROUND_Y - BIRD_HEIGHT / 2;
    return true;
  }

  // Ceiling
  if (bird.y - BIRD_HEIGHT / 2 <= 0) {
    bird.y = BIRD_HEIGHT / 2;
    bird.vy = 0;
  }

  // Pipe collision (using circle-rect for authenticity)
  for (const pipe of pipes) {
    const px = pipe.x;
    const topH = pipe.topHeight;
    const bottomY = topH + PIPE_GAP;
    const capOverhang = 3;

    // Check against top pipe body and cap
    if (circleRectCollision(bird.x, bird.y, BIRD_RADIUS,
        px - capOverhang, 0, PIPE_WIDTH + capOverhang * 2, topH)) {
      return true;
    }

    // Check against bottom pipe body and cap
    if (circleRectCollision(bird.x, bird.y, BIRD_RADIUS,
        px - capOverhang, bottomY, PIPE_WIDTH + capOverhang * 2, GROUND_Y - bottomY)) {
      return true;
    }
  }

  return false;
}

function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
  const nearestX = Math.max(rx, Math.min(cx, rx + rw));
  const nearestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearestX;
  const dy = cy - nearestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

// ============ INPUT HANDLING ============
function flap() {
  initAudio();

  if (gameState === 'menu') {
    gameState = 'playing';
    resetGame();
    bird.vy = FLAP_POWER;
    playSound('flap');
    playSound('swoosh');
    return;
  }

  if (gameState === 'playing') {
    bird.vy = FLAP_POWER;
    playSound('flap');
    return;
  }

  if (gameState === 'dead') {
    gameState = 'menu';
    resetGame();
    playSound('swoosh');
    return;
  }
}

canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  flap();
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  flap();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    flap();
  }
});

// ============ GAME LOOP ============
function update() {
  frameCount++;

  if (gameState === 'playing') {
    // Bird physics
    bird.vy += GRAVITY;
    bird.y += bird.vy;

    // Spawn pipes
    if (frameCount % PIPE_SPAWN_INTERVAL === 0) {
      const minTop = 50;
      const maxTop = GROUND_Y - PIPE_GAP - 50;
      const topHeight = minTop + Math.random() * (maxTop - minTop);
      pipes.push({
        x: GAME_WIDTH + 10,
        topHeight: topHeight,
        scored: false,
      });
    }

    // Move pipes
    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;

      // Score
      if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bird.x) {
        pipes[i].scored = true;
        score++;
        playSound('score');
      }

      // Remove off-screen
      if (pipes[i].x < -PIPE_WIDTH - 10) {
        pipes.splice(i, 1);
      }
    }

    // Collision
    if (checkCollision()) {
      gameState = 'dying';
      bird.alive = false;
      flashAlpha = 1;
      deathTimer = 0;
      playSound('hit');
      setTimeout(() => playSound('die'), 300);

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBest', bestScore.toString());
      }
    }
  }

  if (gameState === 'dying') {
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    deathTimer++;

    if (bird.y + BIRD_HEIGHT / 2 >= GROUND_Y) {
      bird.y = GROUND_Y - BIRD_HEIGHT / 2;
      bird.vy = 0;
    }

    if (deathTimer > 40) {
      gameState = 'dead';
    }
  }

  // Flash effect
  if (flashAlpha > 0) {
    flashAlpha -= 0.05;
  }
}

function draw() {
  ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  // Background
  drawBackground();

  // Pipes
  for (const pipe of pipes) {
    drawPipe(pipe.x, pipe.topHeight);
  }

  // Ground (always on top of pipes)
  drawGround();

  // Bird
  if (gameState !== 'menu') {
    drawBird();
  }

  // Score
  if (gameState === 'playing') {
    drawScore();
  }

  // Menu
  if (gameState === 'menu') {
    drawMenu();
  }

  // Game over
  if (gameState === 'dead') {
    drawGameOver();
  }

  // Death flash
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ============ RESPONSIVE RESIZE ============
window.addEventListener('resize', () => {
  const newScale = Math.min(
    window.innerHeight / GAME_HEIGHT,
    window.innerWidth / GAME_WIDTH,
    2
  );
  canvas.width = GAME_WIDTH * newScale;
  canvas.height = GAME_HEIGHT * newScale;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(newScale, newScale);
  ctx.imageSmoothingEnabled = false;
});

// ============ START ============
gameLoop();
</script>
</body>
